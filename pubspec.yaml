name: expense_tracker
description: Personal BCA credit card expense tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage for JWT
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Formatting
  intl: ^0.19.0

  # Loading skeletons
  shimmer: ^3.0.0

  # Swipe actions on lists
  flutter_slidable: ^3.1.1

  # Color picker for categories
  flex_color_picker: ^3.5.1

  # Icons (extending Material icons)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
